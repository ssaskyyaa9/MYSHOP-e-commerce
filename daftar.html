<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyShop</title>
  <link href="src/style/output.css" rel="stylesheet" />
</head>
<body class="bg-[#E3D5E2] flex items-center justify-center min-h-screen">
  <div class="bg-[#eadcea] p-8 rounded-2xl shadow-md w-[90%] max-w-md relative">
    
    <!-- bagian atas -->
  <div class="flex justify-between items-center mb-6">
      <!-- Tombol back -->
      <button class="text-[#686792]">
        <button onclick="history.back()" class="focus:outline-none">
          <a href="landingpage.html" class="focus:outline-none"></a>
          <img src="src/image/back.png" alt="back" class="absolute w-10 h-10 -mt-20 -ml-199">
        </button>
      </button>
  </div>

      <!-- Judul -->
      <h2 class="text-3xl font-bold text-[#686792] uppercase absolute -mt-26 -ml-87">Daftar MyShop</h2>

    <!-- Form -->
    <form>
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
        <input type="text" placeholder="Masukan nama lengkap" class="w-full px-4 py-2 rounded-full shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
        <input type="email" placeholder="Alamat e-mail aktif" class="w-full px-4 py-2 rounded-full shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" placeholder="Masukan password" class="w-full px-4 py-2 rounded-full shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>

      <button type="submit" class="w-full bg-[#686792] text-white py-2 rounded text-lg font-semibold hover:bg-[#57567a]">Daftar</button>
    </form>

    <p class="text-center text-sm text-gray-700 mt-4">Sudah punya akun?<a href="masuk.html" class="font-semibold text-[#686792]">Masuk sekarang</a></p>

  </div>
</body>
</html>
